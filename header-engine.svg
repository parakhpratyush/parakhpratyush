<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%" style="background: linear-gradient(135deg, #0d1117 0%, #1a1f29 100%); font-family: 'Segoe UI', system-ui, sans-serif;">
  <defs>
    <linearGradient id="cyber-cyan-complex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#4facfe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7f00ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="neon-purple-deep" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#e100ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="deep-matrix-grid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg-grid { fill: url(#deep-matrix-grid); stroke: #238636; stroke-width: 0.2; opacity: 0.1; }
    .matrix-grid { font-family: 'Courier New', monospace; font-size: 11px; fill: #238636; opacity: 0.2; }
    
    /* Main Name Aesthetics */
    .main-title { font-weight: 900; font-size: 58px; fill: #ffffff; letter-spacing: 8px; filter: url(#neon-glow); }
    .sub-title { font-family: 'Courier New', monospace; font-size: 16px; fill: #00f2fe; letter-spacing: 4px; opacity: 0.9; }

    /* Interactive Data Visualization Micro-elements */
    .data-graph { stroke: #238636; stroke-width: 0.5; fill: none; opacity: 0.3; }

    /* Animation Definitions */
    @keyframes breathing { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.03); opacity: 0.95; fill: #e100ff; } }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes complexFlow { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-20px, 15px) scale(1.02); } 100% { transform: translate(0, 0) scale(1); } }
  </style>

  <rect width="1200" height="300" class="bg-grid" />
  
  <text x="30" y="45" class="matrix-grid">01100100 01110011 01100001</text>
  <text x="1040" y="45" class="matrix-grid">[SYSTEM_ACTIVE]</text>
  <text x="30" y="275" class="matrix-grid">AMPLITUDE_SHIFTER_V3.1</text>
  <text x="1010" y="275" class="matrix-grid">CORE_TEMP_OPTIMIZED</text>
  
  <path d="M50,250 Q100,220 150,250 T250,230 Q300,260 350,240" class="data-graph" />
  <path d="M850,250 Q900,220 950,250 T1050,230 Q1100,260 1150,240" class="data-graph" />

  <path d="M0,160 Q300,100 600,170 T1200,140 L1200,300 L0,300 Z" fill="url(#neon-purple-deep)" style="animation: complexFlow 18s indefinite ease-in-out;">
    <animate attributeName="d" values="M0,160 Q300,100 600,170 T1200,140 L1200,300 L0,300 Z;M0,140 Q300,220 600,130 T1200,180 L1200,300 L0,300 Z;M0,160 Q300,100 600,170 T1200,140 L1200,300 L0,300 Z" dur="24s" repeatCount="indefinite" />
  </path>
  
  <path d="M0,190 Q300,250 600,160 T1200,210 L1200,300 L0,300 Z" fill="url(#cyber-cyan-complex)" style="animation: complexFlow 12s indefinite ease-in-out;">
    <animate attributeName="d" values="M0,190 Q300,250 600,160 T1200,210 L1200,300 L0,300 Z;M0,220 Q300,140 600,200 T1200,150 L1200,300 L0,300 Z;M0,190 Q300,250 600,160 T1200,210 L1200,300 L0,300 Z" dur="16s" repeatCount="indefinite" />
  </path>
  
  <path d="M0,210 Q300,180 600,220 T1200,190 L1200,300 L0,300 Z" fill="#007bff" stop-opacity="0.3" style="animation: complexFlow 8s indefinite ease-in-out;">
     <animate attributeName="d" values="M0,210 Q300,180 600,220 T1200,190 L1200,300 L0,300 Z;M0,190 Q300,230 600,170 T1200,200 L1200,300 L0,300 Z;M0,210 Q300,180 600,220 T1200,190 L1200,300 L0,300 Z" dur="10s" repeatCount="indefinite" />
  </path>

  <g transform="translate(600, 150)">
    <text x="0" y="0" text-anchor="middle" class="main-title" style="animation: breathing 6s indefinite ease-in-out;">PARAKH PRATYUSH</text>
    
    <g transform="translate(-230, 45)">
        <text x="0" y="0" class="sub-title" style="overflow: hidden; white-space: nowrap; animation: typing 4s steps(40) 1s normal both;">> EXECUTING_ALGORITHMIC_EFFICIENCY_</text>
        <rect x="445" y="-14" width="10" height="18" fill="#00f2fe" style="animation: blink 1s step-end indefinite;" />
    </g>
  </g>

  <g transform="translate(600, 230)" style="cursor: pointer;">
    <circle cx="0" cy="0" r="6" fill="#00f2fe" filter="url(#neon-glow)">
        <animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#00f2fe;#e100ff;#00f2fe" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="15" stroke="#00f2fe" stroke-width="0.5" fill="none" opacity="0.2">
        <animate attributeName="r" values="15;22;15" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>